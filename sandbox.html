<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTHETIC SYNDICATE | SANDBOX</title>
    <link rel="manifest" href="manifest.json">
    <style>
      /* UPDATED ARMOR & POINTED ANCHORS */
.syndicate-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 0 15px 20px 15px;
    background: linear-gradient(180deg, #2c313a 0%, #0a0b0c 100%);
    border-bottom: 2px solid #3a4454;
}

.header-anchor {
    background: #1e2227;
    padding: 12px 8px;
    width: 75px;
    text-align: center;
    border: 1px solid #4facfe;
    border-top: none;
    /* The "V" Pointing Down */
    clip-path: polygon(0 0, 100% 0, 100% 75%, 50% 100%, 0 75%);
    box-shadow: inset 0 0 10px rgba(79, 172, 254, 0.2);
}

.header-anchor span {
    font-size: 9px;
    color: #fff;
    font-weight: 800;
    letter-spacing: 1px;
}

.logo-center {
    padding-top: 15px;
    text-align: center;
}

.logo-center h1 {
    font-size: 18px;
    line-height: 1;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 900;
}

/* HARDENED CARD DESIGN */
.influencer-card {
    background: #16181b;
    border: 1px solid #333;
    border-top: 3px solid var(--syndicate-blue); /* "Top-Plated" look */
    border-radius: 4px;
    margin-bottom: 30px;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card-header {
    background: rgba(255,255,255,0.03);
    padding: 15px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #222;
}

        :root {
            --bg-dark: #0a0b0c;
            --syndicate-green: #00ff88;
            --syndicate-blue: #4facfe;
            --terminal-gray: #1a1d21;
            --text-dim: #8a94a6;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .phone-shell {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        /* HEADER & ANCHORS */
        .syndicate-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 15px;
            background: linear-gradient(180deg, #16181b 0%, #0a0b0c 100%);
            border-bottom: 2px solid #2d343e;
        }

        .header-anchor {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo-center { text-align: center; }
        .logo-center h1 {
            font-size: 18px;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 800;
        }
        .logo-center span { color: var(--syndicate-blue); }

        /* TELEMETRY TICKER */
        .consensus-feed {
            background: #111;
            padding: 10px 0;
            border-bottom: 1px solid #222;
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-content {
            display: inline-block;
            animation: ticker-move 25s linear infinite;
        }

        @keyframes ticker-move {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .ticker-item {
            display: inline-block;
            padding: 0 30px;
            font-size: 12px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* INFLUENCER CARDS */
        .card-stack { padding: 15px; }
        
        .influencer-card {
            background: var(--terminal-gray);
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #333;
            overflow: hidden;
        }

        .card-header {
            padding: 12px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }

        .card-img {
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
        }

        .ticker-loop-bar {
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-size: 11px;
            border-top: 1px solid var(--syndicate-blue);
            font-family: 'Courier New', monospace;
        }

        .btn-parlay {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--syndicate-blue);
            border: 1px solid var(--syndicate-blue);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="phone-shell">
        <header class="syndicate-header">
            <div class="header-anchor">📊<br>Live Data</div>
            <div class="logo-center"><h1>SYNTHETIC<br><span>SYNDICATE</span></h1></div>
            <div class="header-anchor">👤<br>Account</div>
        </header>

        <div class="consensus-feed">
            <div class="ticker-content">
                <span class="ticker-item">4/5 AI PREDICT <span style="color:var(--syndicate-green)">RAIDERS +3.5</span></span>
                <span class="ticker-item">NBA UNDERDOG ALERT: <span style="color:var(--syndicate-blue)">LAKERS ML</span></span>
                <span class="ticker-item">TELEMETRY SYNC: <span style="color:var(--syndicate-green)">ACTIVE</span></span>
            </div>
        </div>

        <div class="card-stack">
            <div class="influencer-card">
                <div class="card-header">
                    <span><strong>"IRON" MIKE</strong><br><small style="color:var(--text-dim)">NFL Tank</small></span>
                    <span>▶️</span>
                </div>
                <div class="card-img" style="background-image: url('nfl.jpg');"></div>
                <div class="ticker-loop-bar">
                    Ticker loop: 30-Day Record: 22-8 (73%) | <span style="color:var(--syndicate-green)">HOT: Raiders +3.5</span>
                </div>
                <button class="btn-parlay">Tap to see my parlay</button>
            </div>

            <div class="influencer-card">
                <div class="card-header">
                    <span><strong>"SWOOSH"</strong><br><small style="color:var(--text-dim)">NBA Hype Man</small></span>
                    <span>▶️</span>
                </div>
                <div class="card-img" style="background-image: url('nba.jpg');"></div>
                <div class="ticker-loop-bar">
                    Ticker loop: 30-Day Record: 15-15 (50%) | <span style="color:var(--text-dim)">*COOLDOWN PERIOD*</span>
                </div>
                <button class="btn-parlay">Tap to see my parlay</button>
            </div>
        </div>
    </div>

</body>
</html>
